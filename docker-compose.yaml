# Hunapay Ledger Core  Docker Compose
# Forked from blnkfinance/blnk  extended for Hunapay infrastructure
# master_doc.md compliance: PostgreSQL (ACID), Redis (idempotency/cache), observability

version: "3.8"

services:

  #  LEDGER SERVER 
  # Core ledger: double-entry engine, transaction recording, balance management
  # master_doc.md: Ledger = records money. Services = decide business logic.
  hunapay-server:
    image: ${BLNK_IMAGE:-jerryenebeli/blnk:0.13.5}
    container_name: hunapay-server
    restart: on-failure
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "blnk migrate up && blnk start"
    environment:
      TZ: ${TZ:-Africa/Lagos}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://hunapay-jaeger:4318}
    ports:
      - "${BLNK_SERVER_PORT:-5001}:5001"
    depends_on:
      hunapay-postgres:
        condition: service_healthy
      hunapay-redis:
        condition: service_healthy
      hunapay-jaeger:
        condition: service_healthy
    volumes:
      - ./hunapay.json:/blnk.json
    networks:
      - hunapay-net

  #  BACKGROUND WORKER 
  # Processes async transactions from queue (Asynq/Redis-backed)
  hunapay-worker:
    image: ${BLNK_IMAGE:-jerryenebeli/blnk:0.13.5}
    container_name: hunapay-worker
    restart: on-failure
    entrypoint: ["blnk", "workers"]
    environment:
      TZ: ${TZ:-Africa/Lagos}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://hunapay-jaeger:4318}
    depends_on:
      hunapay-postgres:
        condition: service_healthy
      hunapay-redis:
        condition: service_healthy
    volumes:
      - ./hunapay.json:/blnk.json
    networks:
      - hunapay-net

  #  POSTGRESQL 
  # Primary database  ACID compliant, strong consistency
  # master_doc.md: PostgreSQL, ACID compliance, strong consistency, proper indexing
  hunapay-postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${POSTGRES_CONTAINER:-hunapay-postgres}
    restart: on-failure
    ports:
      - "${POSTGRES_OUTER_PORT:-5432}:5432"
    environment:
      TZ: ${TZ:-Africa/Lagos}
      POSTGRES_USER: ${POSTGRES_USER:-hunapay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hunapay_secure_CHANGE_IN_PROD}
      POSTGRES_DB: ${POSTGRES_DB:-hunapay_ledger}
    volumes:
      - hunapay_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-hunapay}", "-d", "${POSTGRES_DB:-hunapay_ledger}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hunapay-net

  #  REDIS 
  # master_doc.md: balance caching, rate limiting, idempotency keys
  hunapay-redis:
    image: redis:7.2.4-alpine
    container_name: ${REDIS_CONTAINER:-hunapay-redis}
    restart: on-failure
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - hunapay_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - hunapay-net

  #  TYPESENSE 
  # Full-text search for ledger records
  hunapay-typesense:
    image: typesense/typesense:29.0
    container_name: ${TYPESENSE_CONTAINER:-hunapay-typesense}
    restart: on-failure
    command: ["--data-dir", "/data", "--api-key=${TYPESENSE_API_KEY:-hunapay-ts-key}", "--listen-port", "8108"]
    ports:
      - "${TYPESENSE_PORT:-8108}:8108"
    volumes:
      - hunapay_typesense_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8108/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - hunapay-net

  #  JAEGER 
  # Distributed tracing  master_doc.md: structured logs, metrics, alerting
  hunapay-jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ${JAEGER_CONTAINER:-hunapay-jaeger}
    restart: on-failure
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hunapay-net

volumes:
  hunapay_pg_data:
  hunapay_redis_data:
  hunapay_typesense_data:

networks:
  hunapay-net:
    driver: bridge